<html lang="ko">
<head>

    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #5cb85c;
            --background-color: #f8f9fa;
            --text-color: #212529;
            --container-bg: #ffffff;
            --border-color: #dee2e6;
            --header-bg: #343a40;
            --header-text: #fff;
            --not-met-color: #e74c3c;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--container-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 20px 25px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 600;
        }
        
        main {
            padding: 25px;
        }

        .student-info-container {
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .student-info-container h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2em;
            color: #495057;
            text-align: center;
        }
        .info-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        .info-inputs input {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 1em;
            flex: 1 1 200px;
            min-width: 150px;
        }
        .excel-upload-container {
            margin-top: 15px;
            text-align: center;
        }
        #excel-upload-button {
            background-color: #3498db;
        }

        .summary-section {
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 10px 25px 15px 25px;
            border-bottom: 1px solid var(--border-color);
            margin: 0 -25px 25px -25px;
        }
        
        .summary-section > h2 {
           display: none;
        }

        .summary-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .summary-box:first-child { 
            flex: 0 1 auto; /* Let it shrink to content */
            min-width: 260px; 
        }
        .summary-box:last-child { 
            flex: 1 1 0; /* Let it take remaining space */
            min-width: 0;
        }
        
        .summary-box h3 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1em;
            text-align: center;
            color: #333;
            font-weight: 600;
        }

        #credit-summary-container { overflow-x: auto; }
        #selected-subjects-summary { overflow-x: auto; }

        #credit-summary-table, #selected-subjects-summary table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8em;
        }
        #credit-summary-table th, #credit-summary-table td,
        #selected-subjects-summary th, #selected-subjects-summary td {
            border: 1px solid var(--border-color);
            padding: 4px 6px;
            text-align: center;
            vertical-align: middle;
        }
        #selected-subjects-summary table { table-layout: fixed; }
        #selected-subjects-summary td { padding: 1px 2px; }

        #credit-summary-table thead th,
        #selected-subjects-summary thead th {
            background-color: #f2f2f2;
            font-weight: 600;
        }

         #credit-summary-table tbody th, 
         #selected-subjects-summary tbody th {
            font-weight: 600;
            background-color: #f9f9f9;
        }
        
        #credit-summary-table tbody th {
            text-align: left;
            padding-left: 4px;
            padding-right: 4px;
        }
        #credit-summary-table td:last-child {
            padding-left: 2px;
            padding-right: 2px;
        }

        #selected-subjects-summary th:first-child,
        #selected-subjects-summary tbody th {
            width: 55px;
        }

        #credit-summary-table .met {
            color: var(--secondary-color);
            font-weight: 600;
        }
        #credit-summary-table .not-met {
            color: var(--not-met-color);
            font-weight: 600;
        }

        .curriculum-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .curriculum-table th, .curriculum-table td {
            border: 1px solid var(--border-color);
            padding: 5px 8px;
            text-align: center;
            vertical-align: middle;
        }

        .curriculum-table thead th {
            position: -webkit-sticky;
            position: sticky;
            top: 0; 
            z-index: 990; 
            background-color: #f2f2f2;
            font-weight: 700;
        }

        .semester-group-header td {
            background-color: #e9ecef;
            font-weight: 700;
            font-size: 1.1em;
            text-align: left;
            padding-left: 15px;
        }
        
        .choice-rule-header td {
             background-color: #fffbe6;
             color: #856404;
             font-weight: bold;
             padding-left: 30px;
             text-align: left;
        }

        .subject-category-cell {
            font-weight: 600;
        }

        .subject-info-cell {
            text-align: left;
            padding-left: 15px;
        }

        .delete-x-btn {
            background: none;
            border: none;
            color: var(--not-met-color);
            cursor: pointer;
            font-size: 1.4em;
            font-weight: bold;
            padding: 0;
            line-height: 1;
        }
        .delete-x-btn:hover {
            transform: scale(1.1);
        }
        
        .add-subject-row td {
            padding: 0;
        }

        .add-subject-button {
            width: 100%;
            background-color: #e9ecef;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #495057;
            transition: background-color 0.3s;
        }
        .add-subject-button:hover {
            background-color: #d1d9e0;
        }

        .new-subject-form-row input {
            width: 95%;
            box-sizing: border-box;
            padding: 6px;
            font-size: 0.9em;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .apply-new-subject-btn {
             background-color: var(--primary-color) !important;
        }

        .action-buttons {
            text-align: right;
            margin-top: 30px;
            padding: 0 10px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .action-button {
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .action-button:hover { transform: translateY(-2px); }
        #print-button { background-color: var(--secondary-color); }
        #export-button { background-color: var(--primary-color); }
        .action-button svg { width: 18px; height: 18px; fill: currentColor; }
        
        #print-header { display: none; }

        @media print {
            body { padding: 0; background-color: #fff; }
            .summary-section { position: static !important; backdrop-filter: none; background-color: #fff !important; }
            .curriculum-table thead th { position: static !important; }
            .action-buttons, header, .student-info-container, .print-hide, .add-subject-button, .delete-x-btn {
                display: none !important;
            }
            .container { box-shadow: none; border-radius: 0; max-width: 100%;}
            main { padding: 10px; }
            #print-header { display: block; text-align: center; margin-bottom: 20px; }
            #print-header h2 { font-size: 1.5em; margin-bottom: 5px; }
            #print-student-info { font-size: 1.1em; margin-bottom: 20px; }

</head>
<body>

    <div class="container">
        <header>
            <h1>상지대관령고등학교 교육과정 편제표 시뮬레이터 (2026학년도 입학생 기준)</h1>
        </header>

        <main>
            <div id="print-header">
                <h2>필수 학점 충족 현황</h2>
                <p id="print-student-info"></p>
            </div>

            <section class="student-info-container">
                <h3>학생 정보 입력</h3>
                <div class="info-inputs">
                    <input type="text" id="student-grade" placeholder="학년">
                    <input type="text" id="student-class" placeholder="반">
                    <input type="text" id="student-number" placeholder="번호">
                    <input type="text" id="student-name" placeholder="이름">
                </div>
                <div class="excel-upload-container">
                    <input type="file" id="excel-upload-input" accept=".xlsx, .xls" style="display: none;">
                    <button id="excel-upload-button" class="action-button">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="18px" height="18px"><path d="M0 0h24v24H0z" fill="none"/><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                        엑셀 업로드
                    </button>
                </div>
            </section>

            <section class="summary-section">
                <h2>이수 현황 요약</h2>
                <div class="summary-wrapper">
                    <div class="summary-box">
                        <h3>필수 학점 충족 현황</h3>
                        <div id="credit-summary-container"></div>
                    </div>
                    <div class="summary-box">
                        <h3>선택 과목 요약</h3>
                        <div id="selected-subjects-summary"></div>
                    </div>
                </div>
            </section>

            <table id="curriculum-table" class="curriculum-table">
                <thead>
                    <tr>
                        <th style="width: 5%;"></th>
                        <th style="width: 15%;">구분</th>
                        <th style="width: 10%;">유형</th>
                        <th style="width: 30%;">과목명</th>
                        <th style="width: 10%;">운영학점</th>
                        <th style="width: 8%;">선택</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>

            <section class="action-buttons">
                <button id="print-button" class="action-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
                    출력하기
                </button>
                <button id="export-button" class="action-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                    내보내기 (Excel)
                </button>
            </section>
        </main>
    </div>

                { "category": "영어", "type": "진로", "name": "영미 문학 읽기", "credits": 4, "year": 3, "semester": "1 or 2", "required": false, "division": "학생선택", "groupName": "3-12-택7" },
                { "category": "사회", "type": "융합", "name": "여행지리", "credits": 4, "year": 3, "semester": "1 or 2", "required": false, "division": "학생선택", "groupName": "3-12-택7" },
                { "category": "과학", "type": "융합", "name": "과학의 역사와 문화", "credits": 4, "year": 3, "semester": "1 or 2", "required": false, "division": "학생선택", "groupName": "3-12-택7" },
                { "category": "생활/교양", "type": "융합", "name": "논술", "credits": 4, "year": 3, "semester": "1 or 2", "required": false, "division": "학생선택", "groupName": "3-12-택7" },
                { "category": "체육", "type": "진로", "name": "스포츠 경기 분석", "credits": 4, "year": 3, "semester": "1 or 2", "required": false, "division": "학생선택", "groupName": "3-12-택7" }
            ],
            "rules": {
                "2-1-택1": { "count": 1, "label": "학교지정(선택) - 택1" },
                "2-1-택4": { "count": 4, "label": "학생선택 - 택4 (16학점)" },
                "2-2-택4": { "count": 4, "label": "학생선택 - 택4 (16학점)" },
                "3-1-택1": { "count": 1, "label": "학생선택 - 택1 (4학점)" },
                "3-12-택7": { "count": 7, "label": "학생선택 - 택7 (28학점)" }
            }
        };

        const summaryCategoryOrder = ["국어", "수학", "영어", "한국사", "통합사회", "통합과학", "예술", "체육", "생활/교양"];

        const tableBody = document.getElementById('table-body');
        const creditSummaryContainer = document.getElementById('credit-summary-container');
        const selectedSubjectsSummaryEl = document.getElementById('selected-subjects-summary');
        const excelUploadButton = document.getElementById('excel-upload-button');
        const excelUploadInput = document.getElementById('excel-upload-input');

        function setStickyHeaderTop() {
            const summaryContainer = document.querySelector('.summary-section');
            if (summaryContainer) {
                const summaryHeight = summaryContainer.offsetHeight;
                const tableHeaders = document.querySelectorAll('.curriculum-table thead th');
                tableHeaders.forEach(th => {
                    th.style.top = `${summaryHeight - 1}px`;
                });
            }
        }

        function renderApp() {
            renderTable();
            renderCreditSummaryTableShell();
            updateSummaryViews();
            attachEventListeners();
        }

        function renderTable() {
            let html = '';
            let subjectIdCounter = Math.max(...curriculumData.subjects.map(s => s.id || 0)) + 1;

            const groupedBySemester = curriculumData.subjects.reduce((acc, subject) => {
                const key = `${subject.year}-${subject.semester}`;
                if (!acc[key]) acc[key] = [];
                acc[key].push(subject);
                return acc;
            }, {});
            
            Object.keys(groupedBySemester).sort().forEach(semesterKey => {
                const [year, semester] = semesterKey.split('-');
                html += `<tr class="semester-group-header"><td colspan="6">${year}학년 ${semester.replace('or', '또는')}학기</td></tr>`;
                
                const subjectsInSemester = groupedBySemester[semesterKey];
                const groupedByDivision = subjectsInSemester.reduce((acc, subject) => {
                    const key = subject.groupName || subject.division;
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(subject);
                    return acc;
                }, {});

                for(const groupKey in groupedByDivision) {
                    const subjectsInGroup = groupedByDivision[groupKey];
                    const rule = curriculumData.rules[groupKey];
                    if(rule) {
                         html += `<tr class="choice-rule-header"><td colspan="6">${rule.label}</td></tr>`;
                    }

                    subjectsInGroup.forEach(subject => {
                        if (subject.id === undefined) subject.id = subjectIdCounter++;
                        html += `
                            <tr data-subject-id="${subject.id}">
                                <td>
                                    ${!subject.required ? `<button class="delete-x-btn" data-subject-id="${subject.id}">&times;</button>` : ''}
                                </td>
                                <td class="subject-category-cell">${subject.category}</td>
                                <td>${subject.type}</td>
                                <td class="subject-info-cell">${subject.name}</td>
                                <td>${subject.credits}</td>
                                <td>
                                    <input type="checkbox" id="subject-${subject.id}" 
                                           data-group-name="${subject.groupName || ''}" 
                                           ${subject.required ? 'checked disabled' : (subject.checked ? 'checked' : '')}>
                                </td>
                            </tr>
                        `;
                    });
                }
                html += `
                    <tr class="add-subject-row">
                        <td colspan="6">
                            <button class="add-subject-button" data-year="${year}" data-semester="${semester.replace(' or ', '_')}">+ 과목 추가</button>
                        </td>
                    </tr>
                `;
            });
            tableBody.innerHTML = html;
        }

        function renderCreditSummaryTableShell() {
            let html = `
                <table id="credit-summary-table">
                    <thead>
                        <tr>
                            <th>구분</th>
                            <th>이수</th>
                            <th>필수</th>
                            <th>충족여부</th>
                        </tr>
                    </thead>
                    <tbody id="credit-summary-body"></tbody>
                </table>
            `;
            creditSummaryContainer.innerHTML = html;
        }

        function updateSummaryViews() {
            updateCredits();
            renderSelectedSubjectsSummary();
            setTimeout(setStickyHeaderTop, 0);
        }

        function updateCredits() {
            const selectedCredits = {};
            curriculumData.subjects.forEach(subject => {
                const checkbox = document.getElementById(`subject-${subject.id}`);
                if (checkbox && checkbox.checked) {
                    const categoryKey = getCreditCategoryKey(subject.category);
                    selectedCredits[categoryKey] = (selectedCredits[categoryKey] || 0) + subject.credits;
                }
            });

            const creditSummaryBody = document.getElementById('credit-summary-body');
            let bodyHtml = '';
            summaryCategoryOrder.forEach(key => {
                if (!curriculumData.필수이수단위.hasOwnProperty(key)) return;
                const required = curriculumData.필수이수단위[key];
                const current = selectedCredits[key] || 0;
                const diff = current - required;

                let statusText = '';
                let statusClass = '';
                if (diff >= 0) {
                    statusText = '충족';
                    statusClass = 'met';
                } else {
                    statusText = `미충족(${diff})`;
                    statusClass = 'not-met';
                }
                const displayName = key === '통합사회' ? '사회' : (key === '통합과학' ? '과학' : key);
                bodyHtml += `
                    <tr>
                        <th>${displayName}</th>
                        <td>${current}</td>
                        <td>${required}</td>
                        <td class="${statusClass}">${statusText}</td>
                    </tr>
                `;
            });
            creditSummaryBody.innerHTML = bodyHtml;
        }
        
        function getCreditCategoryKey(subjectCategory) {
             if (['기술가정', '제2외국어', '한문', '교양', '생활/교양'].includes(subjectCategory)) {
                return '생활/교양';
            }
            if (subjectCategory === '사회') return '통합사회';
            if (subjectCategory === '과학') return '통합과학';
            return subjectCategory;
        }

        function createFitTextSvg(text) {
            const safeText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return `<svg width="100%" height="14" viewBox="0 0 100 14" preserveAspectRatio="xMinYMid meet" style="display: block; margin-bottom: 1px;">
                        <text x="0" y="11" font-family="Pretendard, sans-serif" font-size="11px" textLength="100" lengthAdjust="spacingAndGlyphs">${safeText}</text>
                    </svg>`;
        }

        function renderSelectedSubjectsSummary() {
            const selectedSubjects = curriculumData.subjects.filter(subject => {
                const checkbox = document.getElementById(`subject-${subject.id}`);
                return checkbox && checkbox.checked;
            });

            const semesters = [...new Set(curriculumData.subjects.map(s => `${s.year}-${s.semester}`))].sort();

            if (selectedSubjects.length === 0) {
                selectedSubjectsSummaryEl.innerHTML = '<p style="text-align:center; font-size: 0.9em; color: #6c757d;">과목을 선택하거나 엑셀을 업로드하세요.</p>';
                return;
            }

            let tableHtml = '<table><thead><tr><th>구분</th>';
            semesters.forEach(sem => {
                const [year, semester] = sem.split('-');
                const label = `${year}-${semester.replace('or', '/')}`;
                tableHtml += `<th>${label}</th>`;
            });
            tableHtml += '</tr></thead><tbody>';

            const groupedByCategory = selectedSubjects.reduce((acc, subject) => {
                const key = getCreditCategoryKey(subject.category);
                if (!acc[key]) acc[key] = [];
                acc[key].push(subject);
                return acc;
            }, {});

            summaryCategoryOrder.forEach(categoryKey => {
                if (!groupedByCategory[categoryKey] || groupedByCategory[categoryKey].length === 0) return;

                const displayName = categoryKey === '통합사회' ? '사회' : (categoryKey === '통합과학' ? '과학' : categoryKey);
                tableHtml += `<tr><th>${displayName}</th>`;
                
                semesters.forEach(sem => {
                    const subjectsInSemester = (groupedByCategory[categoryKey] || [])
                                               .filter(s => `${s.year}-${s.semester}` === sem)
                                               .map(s => createFitTextSvg(s.name))
                                               .join('');
                    tableHtml += `<td>${subjectsInSemester || ''}</td>`;
                });
                tableHtml += '</tr>';
            });

            tableHtml += '</tbody></table>';
            selectedSubjectsSummaryEl.innerHTML = tableHtml;
        }

        function attachEventListeners() {
            tableBody.addEventListener('change', (e) => {
                if (e.target.type === 'checkbox') {
                    const subjectId = parseInt(e.target.id.split('-')[1], 10);
                    const subject = curriculumData.subjects.find(s => s.id === subjectId);
                    if (subject) {
                        subject.checked = e.target.checked;
                    }

                    const groupName = e.target.dataset.groupName;
                    if(groupName) {
                        const rule = curriculumData.rules[groupName];
                        if(rule) {
                            const checkboxesInGroup = document.querySelectorAll(`input[data-group-name="${groupName}"]`);
                            const checkedCount = Array.from(checkboxesInGroup).filter(cb => cb.checked).length;

                            if (checkedCount > rule.count) {
                                alert(`${rule.label} 그룹에서는 최대 ${rule.count}개까지만 선택할 수 있습니다.`);
                                e.target.checked = false;
                                if(subject) subject.checked = false;
                            }
                        }
                    }
                    updateSummaryViews();
                }
            });

            tableBody.addEventListener('click', (e) => {
                const target = e.target;

                if (target.classList.contains('add-subject-button')) {
                    if (tableBody.querySelector('.new-subject-form-row')) return;
                    const year = target.dataset.year;
                    const semester = target.dataset.semester.replace('_', ' or ');
                    const newRow = document.createElement('tr');
                    newRow.className = 'new-subject-form-row';
                    newRow.innerHTML = `
                        <td><button class="delete-x-btn cancel-add-btn">&times;</button></td>
                        <td><input type="text" class="new-subject-input" data-field="category" placeholder="구분"></td>
                        <td><input type="text" class="new-subject-input" data-field="type" placeholder="유형"></td>
                        <td><input type="text" class="new-subject-input" data-field="name" placeholder="과목명"></td>
                        <td><input type="number" class="new-subject-input" data-field="credits" placeholder="학점"></td>
                        <td><button class="apply-new-subject-btn action-button">적용</button></td>
                    `;
                    newRow.dataset.year = year;
                    newRow.dataset.semester = semester;
                    target.closest('tr').insertAdjacentElement('beforebegin', newRow);
                }

                if (target.classList.contains('cancel-add-btn')) {
                    target.closest('tr').remove();
                }

                if (target.classList.contains('apply-new-subject-btn')) {
                    const row = target.closest('tr');
                    const newSubject = { required: false, userAdded: true, checked: true };
                    row.querySelectorAll('.new-subject-input').forEach(input => {
                        const field = input.dataset.field;
                        let value = input.value;
                        if (field === 'credits') value = parseInt(value, 10) || 0;
                        newSubject[field] = value;
                    });
                    newSubject.year = parseInt(row.dataset.year, 10);
                    newSubject.semester = row.dataset.semester;
                    
                    if (!newSubject.name || !newSubject.category || newSubject.credits <= 0) {
                        alert('과목명, 구분, 유형, 학점을 올바르게 입력해주세요.');
                        return;
                    }
                    
                    curriculumData.subjects.push(newSubject);
                    renderApp();
                }

                if (target.classList.contains('delete-x-btn') && !target.classList.contains('cancel-add-btn')) {
                    const subjectId = parseInt(target.dataset.subjectId, 10);
                    const subject = curriculumData.subjects.find(s => s.id === subjectId);
                    if (subject) {
                         if (subject.userAdded) {
                            const subjectIndex = curriculumData.subjects.findIndex(s => s.id === subjectId);
                            if (subjectIndex > -1) {
                                curriculumData.subjects.splice(subjectIndex, 1);
                                renderApp();
                            }
                        } else {
                            const checkbox = document.getElementById(`subject-${subjectId}`);
                            if (checkbox) {
                                checkbox.checked = false;
                                subject.checked = false;
                                updateSummaryViews();
                            }
                        }
                    }
                }
            });

            excelUploadButton.addEventListener('click', () => {
                excelUploadInput.click();
            });

            excelUploadInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);

                        if (jsonData.length === 0) {
                            alert('엑셀 파일에 데이터가 없거나 형식이 올바르지 않습니다.');
                            return;
                        }

                        const firstRow = jsonData[0];
                        const subjectColumnKey = Object.keys(firstRow).find(key => key.includes('과목명'));

                        if (!subjectColumnKey) {
                            alert('엑셀 파일에서 \'과목명\' 열을 찾을 수 없습니다.');
                            return;
                        }

                        const uploadedSubjects = new Set(jsonData.map(row => row[subjectColumnKey]).filter(Boolean));
                        
                        curriculumData.subjects.forEach(subject => {
                           if (!subject.required) {
                                subject.checked = uploadedSubjects.has(subject.name);
                            }
                        });

                        renderApp();
                        alert('엑셀 파일의 이수 과목을 성공적으로 반영했습니다.');

                    } catch (error) {
                        console.error('Error processing Excel file:', error);
                        alert('엑셀 파일을 처리하는 중 오류가 발생했습니다. 파일 형식을 확인해주세요.');
                    } finally {
                        excelUploadInput.value = '';
                    }
                };
                reader.readAsArrayBuffer(file);
            });
            
            document.getElementById('print-button').addEventListener('click', () => {
                 const studentInfo = [
                    document.getElementById('student-grade').value,
                    document.getElementById('student-class').value,
                    document.getElementById('student-number').value,
                    document.getElementById('student-name').value
                ].map(v => v || '').join(' ');
                document.getElementById('print-student-info').textContent = studentInfo.trim() ? studentInfo : '학생 정보 미입력';
                window.print();
            });

            document.getElementById('export-button').addEventListener('click', () => {
                const selectedSubjects = curriculumData.subjects.filter(subject => {
                    const checkbox = document.getElementById(`subject-${subject.id}`);
                    return checkbox && checkbox.checked;
                }).map(subject => ({
                    '구분': subject.division,
                    '선택 그룹': subject.groupName ? (curriculumData.rules[subject.groupName]?.label || subject.groupName) : '-',
                    '유형': subject.type,
                    '과목명': subject.name,
                    '학점': subject.credits,
                    '학년': subject.year,
                    '학기': subject.semester
                }));

                if (selectedSubjects.length === 0) {
                    alert('내보내기할 과목을 먼저 선택해주세요.');
                    return;
                }

                const grade = document.getElementById('student-grade').value || '';
                const s_class = document.getElementById('student-class').value || '';
                const number = document.getElementById('student-number').value || '';
                const name = document.getElementById('student-name').value || '';
                const studentInfo = { '학년': grade, '반': s_class, '번호': number, '이름': name };
                const fileName = `${grade}학년${s_class}반${number}번_${name}_선택과목.xlsx` || '선택과목.xlsx';

                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet([studentInfo]), '학생정보');
                XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(selectedSubjects), '선택과목');
                XLSX.writeFile(workbook, fileName);
            });
        }

        renderApp();
        setTimeout(setStickyHeaderTop, 0);
        window.addEventListener('resize', setStickyHeaderTop); 
    });
    </script>
</body>
</html>
