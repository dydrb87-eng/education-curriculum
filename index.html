
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상지대관령고등학교 교육과정 편제표 시뮬레이터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #5cb85c;
            --background-color: #f8f9fa;
            --text-color: #212529;
            --container-bg: #ffffff;
            --border-color: #dee2e6;
            --header-bg: #343a40;
            --header-text: #fff;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--container-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            /* 'overflow: hidden' was preventing sticky positioning */
        }

        header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 20px 25px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 600;
        }
        
        main {
            padding: 25px;
        }

        .credit-summary-container {
            position: -webkit-sticky; /* For Safari */
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            margin: 0 -25px 30px -25px; /* Adjust margin to align with main padding */
            padding-left: 25px;
            padding-right: 25px;
        }

        .credit-summary-container h2 {
            margin: 0 0 15px 0;
            font-size: 1.4em;
            color: #495057;
            text-align: center;
        }

        #credit-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .credit-display {
            text-align: center;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 6px;
        }

        .credit-display .group-name {
            font-weight: 600;
            font-size: 0.95em;
            color: #6c757d;
        }

        .credit-display .credit-value {
            font-weight: 700;
            font-size: 1.2em;
            color: var(--primary-color);
        }
        
        .credit-display .credit-value.met {
            color: var(--secondary-color);
        }

        .curriculum-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .curriculum-table th, .curriculum-table td {
            border: 1px solid var(--border-color);
            padding: 10px 8px;
            text-align: center;
            vertical-align: middle;
        }

        .curriculum-table thead th {
            background-color: #f2f2f2;
            font-weight: 700;
        }

        .semester-group-header td {
            background-color: #e9ecef;
            font-weight: 700;
            font-size: 1.1em;
            text-align: left;
            padding-left: 15px;
        }
        
        .choice-rule-header td {
             background-color: #fffbe6;
             color: #856404;
             font-weight: bold;
             padding-left: 30px;
             text-align: left;
        }

        .subject-category-cell {
            font-weight: 600;
        }

        .subject-info-cell {
            text-align: left;
            padding-left: 15px;
        }

        .action-buttons {
            text-align: right;
            margin-top: 30px;
            padding: 0 10px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .action-button {
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .action-button:hover { transform: translateY(-2px); }
        #print-button { background-color: var(--secondary-color); }
        #export-button { background-color: var(--primary-color); }
        .action-button svg { width: 18px; height: 18px; fill: currentColor; }
        
        @media print {
            body { padding: 0; background-color: #fff; }
            .credit-summary-container { position: static; page-break-after: always; }
            .action-buttons, header { display: none; }
            .container { box-shadow: none; border-radius: 0; max-width: 100%;}
            main { padding: 10px; }
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>상지대관령고등학교 교육과정 편제표 시뮬레이터 (2026학년도 입학생 기준)</h1>
        </header>

        <main>
            <section class="credit-summary-container">
                <h2>필수 이수 단위 실시간 현황</h2>
                <div id="credit-summary"></div>
            </section>

            <table id="curriculum-table" class="curriculum-table">
                <thead>
                    <tr>
                        <th style="width: 10%;">구분</th>
                        <th style="width: 10%;">과목</th>
                        <th style="width: 35%;">과목 정보</th>
                        <th style="width: 8%;">운영<br>학점</th>
                        <th style="width: 8%;">선택</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- JavaScript will populate this area -->
                </tbody>
            </table>

            <section class="action-buttons">
                <button id="print-button" class="action-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
                    출력하기
                </button>
                <button id="export-button" class="action-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                    내보내기 (Excel)
                </button>
            </section>
        </main>
    </div>

                { "category": "체육", "type": "진로", "name": "스포츠 경기 분석", "credits": 4, "year": 3, "semester": "1 or 2", "required": false, "division": "학생선택", "groupName": "3-12-택7" }

            "rules": {
                "2-1-택1": { "count": 1, "label": "학교지정(선택) - 택1" },
                "2-1-택4": { "count": 4, "label": "학생선택 - 택4 (16학점)" },
                "2-2-택4": { "count": 4, "label": "학생선택 - 택4 (16학점)" },
                "3-1-택1": { "count": 1, "label": "학생선택 - 택1 (4학점)" },
                "3-12-택7": { "count": 7, "label": "학생선택 - 택7 (28학점)" }
            }
        };

        const tableBody = document.getElementById('table-body');
        const creditSummary = document.getElementById('credit-summary');

        function renderApp() {
            renderTable();
            renderCreditSummary();
            updateCredits();
            attachEventListeners();
        }

        function renderTable() {
            let html = '';
            let subjectId = 0;

            const groupedBySemester = curriculumData.subjects.reduce((acc, subject) => {
                const key = `${subject.year}-${subject.semester}`;
                (acc[key] = acc[key] || []).push(subject);
                return acc;
            }, {});
            
            Object.keys(groupedBySemester).sort().forEach(semesterKey => {
                const [year, semester] = semesterKey.split('-');
                html += `<tr class="semester-group-header"><td colspan="5">${year}학년 ${semester.replace('or', '또는')}학기</td></tr>`;
                
                const subjectsInSemester = groupedBySemester[semesterKey];
                const groupedByDivision = subjectsInSemester.reduce((acc, subject) => {
                    const key = subject.groupName || subject.division;
                     (acc[key] = acc[key] || []).push(subject);
                    return acc;
                }, {});

                for(const groupKey in groupedByDivision) {
                    const subjectsInGroup = groupedByDivision[groupKey];
                    const rule = curriculumData.rules[groupKey];
                    if(rule) {
                         html += `<tr class="choice-rule-header"><td colspan="5">${rule.label}</td></tr>`;
                    }

                    subjectsInGroup.forEach(subject => {
                        subject.id = subjectId++;
                        html += `
                            <tr>
                                <td class="subject-category-cell">${subject.category}</td>
                                <td>${subject.type}</td>
                                <td class="subject-info-cell">${subject.name}</td>
                                <td>${subject.credits}</td>
                                <td>
                                    <input type="checkbox" id="subject-${subject.id}" 
                                           data-group-name="${subject.groupName || ''}" 
                                           ${subject.required ? 'checked disabled' : ''}>
                                </td>
                            </tr>
                        `;
                    });
                }
            });
            tableBody.innerHTML = html;
        }

        function renderCreditSummary() {
            let html = '';
            for(const key in curriculumData.필수이수단위) {
                html += `
                    <div class="credit-display">
                        <div class="group-name">${key.replace('기술가정/제2외국어/한문/교양', '기타')}</div>
                        <div class="credit-value" id="credit-${key.replace(/[/ ]/g, '-')}">0 / ${curriculumData.필수이수단위[key]}</div>
                    </div>
                `;
            }
            creditSummary.innerHTML = html;
        }

        function updateCredits() {
            const selectedCredits = {};

            curriculumData.subjects.forEach(subject => {
                const checkbox = document.getElementById(`subject-${subject.id}`);
                if (checkbox && checkbox.checked) {
                    const categoryKey = getCreditCategoryKey(subject.category);
                    selectedCredits[categoryKey] = (selectedCredits[categoryKey] || 0) + subject.credits;
                }
            });

            for(const key in curriculumData.필수이수단위) {
                const required = curriculumData.필수이수단위[key];
                const current = selectedCredits[key] || 0;
                const display = document.getElementById(`credit-${key.replace(/[/ ]/g, '-')}`);
                if (display) {
                    display.textContent = `${current} / ${required}`;
                    display.classList.toggle('met', current >= required);
                }
            }
        }
        
        function getCreditCategoryKey(subjectCategory) {
            if (['기술가정', '제2외국어', '한문', '교양'].includes(subjectCategory)) {
                return '기술가정/제2외국어/한문/교양';
            }
            if (subjectCategory === '사회') return '통합사회';
            if (subjectCategory === '과학') return '통합과학';
            return subjectCategory;
        }

        function attachEventListeners() {
            tableBody.addEventListener('change', (e) => {
                if (e.target.type === 'checkbox') {
                    const groupName = e.target.dataset.groupName;
                    if(groupName) {
                        const rule = curriculumData.rules[groupName];
                        if(rule) {
                            const checkboxesInGroup = document.querySelectorAll(`input[data-group-name="${groupName}"]`);
                            const checkedCount = Array.from(checkboxesInGroup).filter(cb => cb.checked).length;

                            if (checkedCount > rule.count) {
                                alert(`${rule.label} 그룹에서는 최대 ${rule.count}개까지만 선택할 수 있습니다.`);
                                e.target.checked = false;
                            }
                        }
                    }
                    updateCredits();
                }
            });
            
            document.getElementById('print-button').addEventListener('click', () => window.print());

            document.getElementById('export-button').addEventListener('click', () => {
                const selectedSubjects = [];
                curriculumData.subjects.forEach(subject => {
                     const checkbox = document.getElementById(`subject-${subject.id}`);
                     if(checkbox && checkbox.checked) {
                        selectedSubjects.push({
                            '구분': subject.division,
                            '선택 그룹': subject.groupName ? (curriculumData.rules[subject.groupName]?.label || subject.groupName) : '-',
                            '과목': subject.name,
                            '학점': subject.credits,
                            '학년': subject.year,
                            '학기': subject.semester
                        });
                     }
                });

                if (selectedSubjects.length === 0) {
                    alert('내보내기할 과목을 먼저 선택해주세요.');
                    return;
                }
                const worksheet = XLSX.utils.json_to_sheet(selectedSubjects);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, '선택과목');
                XLSX.writeFile(workbook, '선택과목_리스트.xlsx');
            });
        }

        renderApp();
    });
    </script>
</body>
</html>
